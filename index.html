<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeSync 🎧</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
        }

        .app {
            display: flex;
            height: 100vh;
        }

        /* Glass */
        .glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Sidebar */
        .sidebar {
            width: 30%;
            padding: 20px;
        }

        #playlist {
            list-style: none;
            padding: 0;
            max-height: 300px;
            overflow-y: auto;
        }

        #playlist li {
            padding: 10px;
            cursor: pointer;
            border-radius: 10px;
        }

        #playlist li:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Player */
        .player {
            flex: 1;
            margin: 20px;
            text-align: center;
            padding: 20px;
        }

        #cover {
            width: 200px;
            border-radius: 15px;
        }

        /* Controls */
        .controls button {
            margin: 10px;
            font-size: 20px;
            padding: 10px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            background: linear-gradient(90deg, #00f2ff, #007bff);
        }

        .controls button:hover {
            transform: scale(1.1);
        }

        /* Progress */
        #progress {
            width: 80%;
        }

        /* 📱 Mobile */
        @media (max-width: 768px) {
            .app {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
            }

            .player {
                margin: 10px;
            }

            #cover {
                width: 120px;
            }

            .controls button {
                font-size: 16px;
            }

            #progress {
                width: 100%;
            }
        }

        .yt-section {
            margin-bottom: 20px;
            padding: 15px;
            text-align: center;
            margin-top: 10px;
        }

        .yt-section input {
            width: 90%;
            padding: 10px;
            border-radius: 10px;
            border: none;
            margin-bottom: 10px;
        }

        .yt-section button {
            padding: 10px 15px;
            border-radius: 20px;
            border: none;
            background: linear-gradient(90deg, #ff416c, #ff4b2b);
            color: white;
            cursor: pointer;
        }

        .yt-section button:hover {
            transform: scale(1.15);
        }

        .note {
            font-size: 12px;
            opacity: 0.7;
        }

        #playlist li.active {
            background: rgba(0, 255, 255, 0.3);
        }
    </style>
</head>

<body>

    <h2 style="text-align:center;">🎧 VibeSync - Your Music. Your Vibe. No Ads.</h2>

    <div class="app">

        <!-- Sidebar -->
        <div class="sidebar glass">
            <h3>My Music</h3>
            <input type="file" id="upload" accept="audio/*">
            <ul id="playlist"></ul>
        </div>

        <div class="yt-section glass">
            <h3>🎥 Add from YouTube</h3>

            <input type="text" id="ytLink" placeholder="Paste YouTube video link...">

            <button id="convertBtn">Convert to MP3 🎵</button>

            <p class="note">
                ⚠️ You will be redirected to convert. Download MP3 and upload below.
            </p>
        </div>


        <!-- Player -->
        <div class="player glass">
            <img src="https://via.placeholder.com/200" id="cover">

            <h3 id="songName">No Song Selected</h3>

            <audio id="audio" controls></audio>

            <div class="controls">
                <button id="prev">⏮️</button>
                <button id="play">▶️</button>
                <button id="next">⏭️</button>
            </div>

            <input type="range" id="progress" value="0">
        </div>

    </div>

    <!-- 🔥 JS at bottom (IMPORTANT) -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {

            const upload = document.getElementById("upload");
            const playlist = document.getElementById("playlist");
            const audio = document.getElementById("audio");
            const songName = document.getElementById("songName");
            const playBtn = document.getElementById("play");
            const progress = document.getElementById("progress");

            let db;

            // 🧠 DB
            const request = indexedDB.open("VibeSyncDB", 1);

            request.onupgradeneeded = (e) => {
                db = e.target.result;
                db.createObjectStore("songs", { autoIncrement: true });
            };

            request.onsuccess = (e) => {
                db = e.target.result;
                loadSongs();
            };

            // 📤 Upload
            upload.addEventListener("change", (e) => {
                const file = e.target.files[0];

                if (!file || !file.type.startsWith("audio/")) {
                    alert("Only audio files allowed ❌");
                    return;
                }

                const tx = db.transaction("songs", "readwrite");
                const store = tx.objectStore("songs");

                store.add(file);

                tx.oncomplete = () => loadSongs();
            });

            let currentActive = null;

            // 📜 Load songs
            function loadSongs() {
                playlist.innerHTML = "";

                const tx = db.transaction("songs", "readonly");
                const store = tx.objectStore("songs");

                store.openCursor().onsuccess = (e) => {
                    const cursor = e.target.result;

                    if (cursor) {
                        const file = cursor.value;

                        const li = document.createElement("li");
                        li.textContent = file.name;

                        li.onclick = () => {
                            const url = URL.createObjectURL(file);
                            audio.src = url;
                            songName.innerText = file.name;
                            audio.play();
                        };

                        playlist.appendChild(li);
                        cursor.continue();
                    }
                };
            }

            // ▶️ Play/Pause
            playBtn.onclick = () => {
                if (audio.paused) {
                    audio.play();
                    playBtn.innerText = "⏸️";
                } else {
                    audio.pause();
                    playBtn.innerText = "▶️";
                }
            };

            // 📊 Progress bar
            audio.ontimeupdate = () => {
                progress.value = (audio.currentTime / audio.duration) * 100 || 0;
            };

            progress.oninput = () => {
                audio.currentTime = (progress.value / 100) * audio.duration;
            };

        });

        // 🔗 YouTube conversion
        const ytBtn = document.getElementById("convertBtn");

        ytBtn.onclick = () => {
            const link = document.getElementById("ytLink").value;

            if (!link.includes("youtube.com") && !link.includes("youtu.be")) {
                alert("Enter valid YouTube link ❌");
                return;
            }

            // 🔥 Redirect to converter site
            window.open("https://ytmp3.nu", "_blank");
        };
        document.querySelectorAll("#playlist li").forEach(li => {
            li.style.background = "none";
        });

        li.style.background = "rgba(0,255,255,0.3)";

        audio.onended = () => {
            // next song logic (index maintain karna padega)
        };

        li.innerHTML = file.name + " ❌";

        li.onclick = () => {
            audio.src = URL.createObjectURL(file);
            songName.innerText = file.name;
            audio.play();

            document.querySelectorAll("#playlist li").forEach(el => {
                el.classList.remove("active");
            });

            li.classList.add("active");
        };

    </script>

</body>

</html>
