<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeSync 🎧</title>
    <link rel="icon" type="image/png" href="favicon.png.png">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
        }

        .app {
            display: flex;
            height: 100vh;
        }

        .app {
            display: grid;
            grid-template-columns: 280px 280px 1fr;
            /* 🔥 fixed width */
            gap: 20px;
            padding: 20px;
        }

        .sidebar,
        .yt-section {
            min-width: 250px;
        }

        /* Glass */
        .glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Sidebar */
        .sidebar {
            width: 30%;
            padding: 20px;
        }

        #playlist {
            list-style: none;
            padding: 0;
            max-height: 300px;
            overflow-y: auto;
        }

        #playlist li {
            padding: 10px;
            cursor: pointer;
            border-radius: 10px;
        }

        #playlist li:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Player */
        .player {
            flex: 1;
            margin: 20px;
            text-align: center;
            padding: 20px;
        }

        #cover {
            width: 150px;
            border-radius: 30px;
            box-shadow: 0 0 20px rgba(0, 13, 255, 0.527);
        }

        /* Controls */
        .controls button {
            margin: 10px;
            font-size: 20px;
            padding: 10px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            background: linear-gradient(90deg, #00f2ff, #007bff);
        }

        .controls button:hover {
            transform: scale(1.1);
        }

        /* Progress */
        #progress {
            width: 80%;
        }

        /* 📱 Mobile */
        @media (max-width: 768px) {
            .app {
                display: flex;
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
            }

            .player {
                margin: 10px;
            }

            #cover {
                width: 120px;
            }

            .controls button {
                font-size: 16px;
            }

            #progress {
                width: 100%;
            }
        }

        .yt-section {
            margin-bottom: 20px;
            padding: 15px;
            text-align: center;
            margin-top: 10px;
        }

        .yt-section input {
            width: 90%;
            padding: 10px;
            border-radius: 10px;
            border: none;
            margin-bottom: 10px;
        }

        .yt-section button {
            padding: 10px 15px;
            border-radius: 20px;
            border: none;
            background: linear-gradient(90deg, #ff416c, #ff4b2b);
            color: white;
            cursor: pointer;
        }

        .yt-section button:hover {
            transform: scale(1.15);
        }

        .note {
            font-size: 12px;
            opacity: 0.7;
        }

        #playlist li.active {
            background: rgba(0, 255, 255, 0.3);
        }

        /* 🎬 Logo Video Styling */
        #logoVideo {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border-radius: 20px;

            display: block;
            margin: 20px auto;

            /* 🔥 Glow Effect */
            box-shadow:
                0 0 15px #00f2ff,
                0 0 30px #007bff,
                0 0 50px rgba(0, 242, 255, 0.5);

            /* ⚡ Smooth animation */
            animation: glow 2s infinite alternate;

            transition: transform 0.3s ease;
        }

        /* 🔥 Hover Effect */
        #logoVideo:hover {
            transform: scale(1.05);
        }

        /* ✨ Glow Animation */
        @keyframes glow {
            from {
                box-shadow:
                    0 0 10px #00f2ff,
                    0 0 20px #007bff;
            }

            to {
                box-shadow:
                    0 0 25px #00f2ff,
                    0 0 50px #007bff,
                    0 0 70px rgba(0, 242, 255, 0.7);
            }
        }

        /* 📱 Mobile Responsive */
        @media (max-width: 768px) {
            #logoVideo {
                width: 130px;
                height: 130px;
            }
        }

        .mini-player {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;

            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);

            display: flex;
            justify-content: space-between;
            align-items: center;

            padding: 10px 20px;
            color: white;

            border-top: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 1000;
        }

        .mini-player button {
            margin: 0 5px;
            padding: 8px 10px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            background: linear-gradient(90deg, #00f2ff, #007bff);
            color: white;
        }

        #miniProgress {
            width: 120px;
        }

        .mini-player {
            border-radius: 15px 15px 0 0;
        }

        .mini-player {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;

            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);

            display: flex;
            justify-content: space-between;
            align-items: center;

            padding: 10px 20px;
            color: white;

            z-index: 9999;
            /* 🔥 click issue fix */
        }

        .mini-player div {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .mini-player button {
            width: 40px;
            height: 40px;

            border-radius: 50%;
            border: none;
            cursor: pointer;

            display: flex;
            align-items: center;
            justify-content: center;

            font-size: 18px;

            background: linear-gradient(90deg, #00f2ff, #007bff);
        }

        .mini-player * {
            pointer-events: auto;
        }

        body {
            padding-bottom: 70px;
            /* 🔥 mini player overflow... */
        }
    </style>
</head>

<body>

    <h2 style="text-align:center;">🎧 VibeSync - Your Music. Your Vibe. No Ads.</h2>

    <div class="app">

        <!-- Sidebar -->
        <div class="sidebar glass">
            <h3>My Music</h3>
            <input type="file" id="upload" accept="audio/*">
            <ul id="playlist"></ul>
        </div>

        <div class="yt-section glass">
            <h3>🎥 Add from YouTube</h3>

            <input type="text" id="ytLink" placeholder="Paste YouTube video link...">

            <button id="convertBtn">Convert to MP3 🎵</button>

            <p class="note">
                ⚠️ You will be redirected to convert. Download MP3 and upload below.
            </p>
        </div>


        <!-- Player -->
        <div class="player glass">
            <video id="logoVideo" loop muted playsinline>
                <source src="VIBSYNC.mp4" type="video/mp4">
            </video>

            <h3 id="songName">No Song Selected</h3>

            <audio id="audio" controls></audio>

            <div class="controls">
                <button id="prev">⏮️</button>
                <button id="play">▶️</button>
                <button id="next">⏭️</button>
            </div>
        </div>
        <div class="mini-player">
            <span id="miniSong">No song</span>
            <input type="range" id="miniProgress" value="0">

            <div>
                <button id="miniPrev">⏮️</button>
                <button id="miniPlay">▶️</button>
                <button id="miniNext">⏭️</button>
            </div>
        </div>

        <input type="range" id="progress" value="0">
    </div>

    <!-- 🔥 JS at bottom (IMPORTANT) -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {

            const upload = document.getElementById("upload");
            const playlist = document.getElementById("playlist");
            const audio = document.getElementById("audio");
            const songName = document.getElementById("songName");
            const playBtn = document.getElementById("play");
            const progress = document.getElementById("progress");

            let songs = [];
            let currentIndex = 0;

            const miniPlay = document.getElementById("miniPlay");
            const miniNext = document.getElementById("miniNext");
            const miniPrev = document.getElementById("miniPrev");
            const miniSong = document.getElementById("miniSong");

            // 🎵 Song name update
            function updateMiniPlayer(name) {
                miniSong.innerText = name;
            }

            let db;

            // 🧠 DB
            const request = indexedDB.open("VibeSyncDB", 1);

            request.onupgradeneeded = (e) => {
                db = e.target.result;
                db.createObjectStore("songs", { autoIncrement: true });
            };

            request.onsuccess = (e) => {
                db = e.target.result;
                loadSongs();
            };

            // 📤 Upload
            upload.addEventListener("change", (e) => {
                const file = e.target.files[0];

                if (!file || !file.type.startsWith("audio/")) {
                    alert("Only audio files allowed ❌");
                    return;
                }

                const tx = db.transaction("songs", "readwrite");
                const store = tx.objectStore("songs");

                store.add(file);

                tx.oncomplete = () => loadSongs();
            });

            let currentActive = null;

            // 📜 Load songs
            function loadSongs() {
                playlist.innerHTML = "";
                songs = [];

                const tx = db.transaction("songs", "readonly");
                const store = tx.objectStore("songs");

                store.openCursor().onsuccess = (e) => {
                    const cursor = e.target.result;

                    if (cursor) {
                        const file = cursor.value;
                        songs.push(file);

                        const li = document.createElement("li");
                        li.textContent = file.name;

                        li.onclick = () => {
                            currentIndex = songs.indexOf(file);
                            playSong(currentIndex);
                        };

                        playlist.appendChild(li);
                        cursor.continue();
                    }
                };
            }

            // ▶️ Play/Pause
            playBtn.onclick = () => {
                if (audio.paused) {
                    audio.play();
                    playBtn.innerText = "⏸️";
                } else {
                    audio.pause();
                    playBtn.innerText = "▶️";
                }
            };

            function playSong(index) {
                const file = songs[index];

                if (!file) return;

                const url = URL.createObjectURL(file);

                audio.src = url;
                songName.innerText = file.name;

                audio.play();

                // highlight
                document.querySelectorAll("#playlist li").forEach(el => {
                    el.classList.remove("active");
                });

                playlist.children[index].classList.add("active");
                updateMiniPlayer(file.name);
            }

            const nextBtn = document.getElementById("next");
            const prevBtn = document.getElementById("prev");

            nextBtn.onclick = () => {
                currentIndex++;

                if (currentIndex >= songs.length) {
                    currentIndex = 0; // loop
                }

                playSong(currentIndex);
            };

            prevBtn.onclick = () => {
                currentIndex--;

                if (currentIndex < 0) {
                    currentIndex = songs.length - 1;
                }

                playSong(currentIndex);
            };

            audio.addEventListener("ended", () => {
                currentIndex++;

                if (currentIndex >= songs.length) {
                    currentIndex = 0;
                }

                playSong(currentIndex);
            });


            // 📊 Progress bar
            audio.ontimeupdate = () => {
                progress.value = (audio.currentTime / audio.duration) * 100 || 0;
            };

            progress.oninput = () => {
                audio.currentTime = (progress.value / 100) * audio.duration;
            };

        });

        // 🔗 YouTube conversion
        const ytBtn = document.getElementById("convertBtn");

        ytBtn.onclick = () => {
            const link = document.getElementById("ytLink").value;

            if (!link.includes("youtube.com") && !link.includes("youtu.be")) {
                alert("Enter valid YouTube link ❌");
                return;
            }

            // 🔥 Redirect to converter site
            window.open("https://ytmp3.nu", "_blank");
        };

        const video = document.getElementById("logoVideo");

        // ▶️ Play
        audio.addEventListener("play", () => {
            video.currentTime = 0;
            video.play().catch(err => console.log(err));
        });

        // ⏸️ Pause
        audio.addEventListener("pause", () => {
            video.pause();
        });

        // 🔁 End
        audio.addEventListener("ended", () => {
            video.pause();
            video.currentTime = 0;
        });

        miniPlay.onclick = () => {
            if (audio.paused) {
                audio.play();
                miniPlay.innerText = "⏸️";
            } else {
                audio.pause();
                miniPlay.innerText = "▶️";
            }
        };

        miniNext.onclick = () => {
            nextBtn.click();
        };

        miniPrev.onclick = () => {
            prevBtn.click();
        };

        audio.addEventListener("play", () => {
            miniPlay.innerText = "⏸️";
        });

        audio.addEventListener("pause", () => {
            miniPlay.innerText = "▶️";
        });

        const miniProgress = document.getElementById("miniProgress");

        audio.addEventListener("timeupdate", () => {
            miniProgress.value = (audio.currentTime / audio.duration) * 100 || 0;
        });

        miniProgress.oninput = () => {
            audio.currentTime = (miniProgress.value / 100) * audio.duration;
        };

    </script>

</body>

</html>
